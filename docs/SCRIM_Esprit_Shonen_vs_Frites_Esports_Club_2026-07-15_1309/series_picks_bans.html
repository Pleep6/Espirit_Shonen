@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c89b3c;--gold2:#f0d07a;--dark:#0a0c10;--panel:#0f1319;--panel2:#131820;
  --border:#1e2a38;--border2:#243040;--text:#b0c4d8;--text2:#6a8090;
  --blue:#4fc3f7;--blue-bg:rgba(79,195,247,.08);--blue-border:rgba(79,195,247,.3);
  --red:#ef5350;--red-bg:rgba(239,83,80,.08);--red-border:rgba(239,83,80,.3);
  --fear:#ff5252;--fear-bg:rgba(255,82,82,.07);
  --win:#4caf50;--win-bg:rgba(76,175,80,.13);--win-border:rgba(76,175,80,.35);
  --top:#4fc3f7;--jgl:#66bb6a;--mid:#f0d07a;--adc:#ef5350;--sup:#ce93d8;
}
html,body{height:100vh;width:100vw;overflow:hidden;background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;display:flex;flex-direction:column;}
.hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--panel);gap:12px;}
h1{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);white-space:nowrap}
.tabs{display:flex;gap:5px;flex-shrink:0}
.tab{padding:5px 16px;border-radius:4px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;transition:all .15s;user-select:none;}
.tab:hover{background:var(--panel2);color:var(--text)}.tab.active{border-color:var(--gold);background:rgba(200,155,60,.1);color:var(--gold)}
.content{flex:1;min-height:0;overflow-y:auto;padding:12px 20px;display:flex;flex-direction:column;gap:14px;}
.content::-webkit-scrollbar{width:5px}.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.game-section{display:none}.game-section.visible{display:flex;flex-direction:column;gap:12px}
.game-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--gold);text-align:center;padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:12px;}
.winner-badge{display:inline-flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--win);background:var(--win-bg);border:1px solid var(--win-border);border-radius:4px;padding:2px 10px;}
.draft-sequence{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:grid;grid-template-columns:1fr 28px 1fr;}
.seq-col{display:flex;flex-direction:column;}
.seq-col-hdr{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);}
.seq-col-hdr.blue{background:var(--blue-bg);border-left:3px solid var(--blue);}
.seq-col-hdr.red{background:var(--red-bg);border-right:3px solid var(--red);justify-content:flex-end;flex-direction:row-reverse;}
.seq-team-name{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.seq-col-hdr.blue .seq-team-name{color:var(--blue)}.seq-col-hdr.red .seq-team-name{color:var(--red)}
.seq-team-side{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--text2);}
.seq-vsbar{display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:2px;color:var(--text2);background:var(--panel2);border-left:1px solid var(--border);border-right:1px solid var(--border);writing-mode:vertical-rl;}
.seq-phase-block{padding:10px 14px 8px;border-bottom:1px solid var(--border);}
.seq-phase-block:last-child{border-bottom:none;}
.seq-phase-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
.seq-cards{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start;}
.seq-ban{display:flex;flex-direction:column;align-items:center;gap:3px;width:52px;}
.seq-ban-ico{position:relative;width:44px;height:44px;border-radius:6px;overflow:hidden;background:#111;border:2px solid rgba(239,83,80,.35);}
.seq-ban-ico img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(50%) brightness(0.65);}
.seq-ban-ico::after{content:'';position:absolute;inset:0;background:rgba(239,83,80,.15);}
.seq-ban-x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:rgba(239,83,80,.75);z-index:1;font-weight:900;}
.seq-ban-name{font-family:'Barlow Condensed',sans-serif;font-size:.55rem;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:52px;color:rgba(239,83,80,.8);}
.seq-pick{display:flex;flex-direction:column;align-items:center;gap:3px;width:58px;}
.seq-pick-ico{width:50px;height:50px;border-radius:6px;overflow:hidden;background:#111;position:relative;}
.seq-pick-ico.blue{border:2px solid var(--blue);box-shadow:0 0 10px rgba(79,195,247,.25);}
.seq-pick-ico.red{border:2px solid var(--red);box-shadow:0 0 10px rgba(239,83,80,.25);}
.seq-pick-ico img{width:100%;height:100%;object-fit:cover;display:block;}
.seq-pick-num{position:absolute;bottom:2px;right:3px;font-family:'Share Tech Mono',monospace;font-size:.44rem;color:rgba(255,255,255,.6);background:rgba(0,0,0,.55);padding:0 3px;border-radius:2px;line-height:1.4;}
.seq-pick-champ{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;color:var(--gold2);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:58px;}
.seq-pick-player{font-family:'Share Tech Mono',monospace;font-size:.48rem;color:var(--text2);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:58px;}
.draft-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.team-panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;}
.team-panel.winner{border-color:var(--win-border);box-shadow:0 0 14px rgba(76,175,80,.1);}
.team-hdr{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);}
.team-hdr.blue{background:var(--blue-bg);border-left:3px solid var(--blue);}
.team-hdr.red{background:var(--red-bg);border-left:3px solid var(--red);}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.team-hdr.blue .team-name{color:var(--blue)}.team-hdr.red .team-name{color:var(--red)}
.team-side{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--text2);margin-left:auto;}
.picks-list{display:flex;flex-direction:column;gap:2px;padding:6px 8px;}
.pick-row{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:5px;background:var(--panel2);border:1px solid var(--border);}
.champ-ico{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid var(--border2);flex-shrink:0;background:#111;}
.champ-ico img{width:100%;height:100%;object-fit:cover;display:block}
.pick-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;}
.pick-champ{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;color:var(--gold2);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pick-player{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--text2);}
.pick-role{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;padding:2px 7px;border-radius:3px;font-weight:700;flex-shrink:0;}
.r-top{background:rgba(79,195,247,.12);color:var(--top);border:1px solid rgba(79,195,247,.25);}
.r-jungle{background:rgba(102,187,106,.12);color:var(--jgl);border:1px solid rgba(102,187,106,.25);}

.r-adc{background:rgba(239,83,80,.12);color:var(--adc);border:1px solid rgba(239,83,80,.25);}
.r-support{background:rgba(206,147,216,.12);color:var(--sup);border:1px solid rgba(206,147,216,.25);}
.pick-num{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--text2);background:var(--border);border-radius:3px;padding:1px 5px;flex-shrink:0;}
.pick-num.p2{color:var(--gold);background:rgba(200,155,60,.12);border:1px solid rgba(200,155,60,.2);}
.fear-panel{background:var(--panel);border:1px solid rgba(255,82,82,.2);border-radius:6px;padding:8px 14px;}
.fear-title{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#ff5252;margin-bottom:6px;}
.fear-chips{display:flex;gap:5px;flex-wrap:wrap;}
.fear-chip{display:flex;align-items:center;gap:4px;padding:2px 7px 2px 3px;border-radius:4px;background:rgba(255,82,82,.07);border:1px solid rgba(255,82,82,.18);}
.ban-ico{width:20px;height:20px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#111;}
.ban-ico img{width:100%;height:100%;object-fit:cover;display:block}
.fear-chip-name{font-family:'Barlow',sans-serif;font-size:.7rem;font-weight:600;color:rgba(255,82,82,.8);}
.all-block{display:flex;flex-direction:column;gap:12px;padding-top:12px;border-top:1px solid var(--border);}
.all-block:first-child{border-top:none;padding-top:0;}

  function champImg(name){
    const src=CHAMP_ICONS[name||'']||'';
    return `<img src="${src}" alt="${name||''}" style="${src?'':'display:none'}">`;
  }
  function renderGame(g){
    const wt=g.winning_team||'';const winnerName=wt?(g.team_names||{})[wt]:'';
    const winBadge=winnerName?`<span class="winner-badge">🏆 ${winnerName} WIN</span>`:'';
    const sides=g.team_sides||{};const tn=g.team_names||{};const tids=Object.keys(tn);
    return`<div class="game-lbl"><span>GAME ${g.game_num} · PATCH ${(g.game_version||'?').split('.').slice(0,2).join('.')}</span>${winBadge}</div>${renderFearless(g)}${renderSequence(g)}<div class="draft-grid">${tids.map(tid=>renderTeam(g.picks?.[tid],tid,wt,sides,tn)).join('')}</div>`;
  }
  const tabs=document.getElementById('tabs'),content=document.getElementById('content');
  const allTab=document.createElement('div');allTab.className='tab active';allTab.textContent='ALL';allTab.dataset.s='all';tabs.appendChild(allTab);
  DATA.games.forEach(g=>{const t=document.createElement('div');t.className='tab';t.textContent=`GAME ${g.game_num}`;t.dataset.s=String(g.game_num);tabs.appendChild(t);});
  const allSec=document.createElement('div');allSec.className='game-section visible';allSec.dataset.sec='all';
  DATA.games.forEach(g=>{const b=document.createElement('div');b.className='all-block';b.innerHTML=renderGame(g);allSec.appendChild(b);});
  content.appendChild(allSec);
  DATA.games.forEach(g=>{const sec=document.createElement('div');sec.className='game-section';sec.dataset.sec=String(g.game_num);sec.innerHTML=renderGame(g);content.appendChild(sec);});
  tabs.addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;tabs.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');const s=t.dataset.s;document.querySelectorAll('.game-section').forEach(x=>x.classList.toggle('visible',x.dataset.sec===s));});
})();

// ── runas: estilos del chip + tooltip global (evita clipping del panel) ──
(function(){
  document.head.insertAdjacentHTML('beforeend','<style>'
    +'.rune-chip{display:inline-flex;align-items:center;gap:3px;margin-top:2px;cursor:help;vertical-align:middle;}'
    +'.rc-k{width:22px;height:22px;border-radius:50%;border:1px solid var(--gold);background:#0a0c10;}'
    +'.rc-t{width:13px;height:13px;opacity:.85;}'
    +'.rc-n{font-family:Barlow Condensed,sans-serif;font-size:.6rem;color:var(--gold);letter-spacing:.5px;}'
    +'#runeTT{position:fixed;display:none;z-index:999;background:#0f1319;border:1px solid #243040;border-radius:6px;'
    +'padding:9px 12px;box-shadow:0 6px 24px rgba(0,0,0,.65);flex-direction:column;gap:4px;pointer-events:none;}'
    +'#runeTT .rp-trees{display:flex;gap:6px;align-items:center;border-bottom:1px solid #1e2a38;padding-bottom:5px;margin-bottom:3px;}'
    +'#runeTT .rp-trees img{width:16px;height:16px;}'
    +'#runeTT .rp-i{display:flex;align-items:center;gap:8px;}'
    +'#runeTT .rp-i img{width:22px;height:22px;}'
    +'#runeTT .rp-i i{font-style:normal;font-family:Barlow,sans-serif;font-size:.74rem;color:#b0c4d8;white-space:nowrap;}'
    +'#runeTT .rp-key img{width:28px;height:28px;border-radius:50%;border:1px solid var(--gold);}'
    +'#runeTT .rp-key i{color:var(--gold2);font-weight:700;}'
    +'#runeTT .rp-shard img{width:15px;height:15px;margin-left:4px;}'
    +'#runeTT .rp-shard i{color:#6a8090;font-size:.66rem;}'
    +'</style>');
  const tt=document.createElement('div'); tt.id='runeTT'; document.body.appendChild(tt);
  const IC=DATA.rune_icons||{}, NM=DATA.rune_names||{};
  document.addEventListener('mouseover',function(e){
    const chip=e.target.closest?e.target.closest('.rune-chip'):null;
    if(!chip){tt.style.display='none';return;}
    const ids=(chip.dataset.runes||'').split(',').filter(Boolean);
    if(!ids.length){tt.style.display='none';return;}
    const trees=(chip.dataset.trees||'').split(',').filter(Boolean);
    let html='';
    if(trees.length) html+='<span class="rp-trees">'+trees.map(function(t){
      return '<img src="'+(IC[t]||'')+'" onerror="this.remove()"><i style="font-family:Barlow,sans-serif;font-size:.68rem;color:#6a8090">'+(NM[t]||t)+'</i>';
    }).join('<span style="color:#4a6070">+</span>')+'</span>';
    html+=ids.map(function(id,i){
      const cls=i===0?'rp-i rp-key':(i>=6?'rp-i rp-shard':'rp-i');
      return '<span class="'+cls+'"><img src="'+(IC[id]||'')+'" onerror="this.remove()"><i>'+(NM[id]||id)+'</i></span>';
    }).join('');
    tt.innerHTML=html;
    tt.style.display='flex';
    const r=chip.getBoundingClientRect();
    tt.style.left=r.left+'px'; tt.style.top=(r.bottom+8)+'px';
    const tr=tt.getBoundingClientRect();
    if(tr.right>window.innerWidth-8) tt.style.left=(window.innerWidth-tr.width-8)+'px';
    if(tr.bottom>window.innerHeight-8) tt.style.top=(r.top-tr.height-8)+'px';
  });
})();

</script></body></html>
