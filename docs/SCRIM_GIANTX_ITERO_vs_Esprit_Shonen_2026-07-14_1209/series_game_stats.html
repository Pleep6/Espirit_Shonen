*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{height:100vh;width:100vw;overflow:hidden;background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;}
.hdr{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:6px 16px;border-bottom:1px solid var(--border);background:var(--panel);}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--gold2);}
.tabs{display:flex;gap:4px;margin-left:auto;}.tab{padding:4px 13px;border-radius:3px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:all .15s;user-select:none;}.tab.active{border-color:var(--gold);background:rgba(200,155,60,.08);color:var(--gold);}
.content{flex:1;min-height:0;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:10px;}.content::-webkit-scrollbar{width:4px}.content::-webkit-scrollbar-thumb{background:var(--border2)}
.section{display:none}.section.active{display:flex;flex-direction:column;gap:10px;}
.sec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--text2);padding:3px 0;border-bottom:1px solid var(--border);}
.gtable{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.gtable th{font-family:'Barlow Condensed',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text2);padding:6px 10px;border-bottom:1px solid var(--border);background:var(--panel2);text-align:left;}
.gtable td{font-size:.8rem;padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}.gtable tr:last-child td{border-bottom:none;}
.mono{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--gold2);}.mono.g{color:var(--green)}.mono.r{color:var(--red)}.mono.b{color:var(--blue)}.mono.dim{color:var(--text2);}
.champ-cell{display:flex;align-items:center;gap:6px;}.cico{width:26px;height:26px;border-radius:50%;overflow:hidden;background:var(--panel2);border:1px solid var(--border2);flex-shrink:0;}.cico img{width:100%;height:100%;object-fit:cover;display:block;}.cname{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;color:var(--text);}
.role-tag{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:2px;background:var(--panel2);color:var(--text2);border:1px solid var(--border2);}
.side-b{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-bd);}.side-r{background:var(--red-dim);color:var(--red);border:1px solid var(--red-bd);}
.win-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:2px;padding:2px 8px;border-radius:3px;background:var(--win-bg);color:var(--win);border:1px solid rgba(76,175,80,.3);}
.obj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:5px;}
.obj-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:6px 10px;display:flex;flex-direction:column;gap:2px;}
.obj-pct{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;color:var(--gold2);line-height:1;}
.obj-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.56rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);}
.obj-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}.obj-fill{height:100%;border-radius:2px;background:var(--gold);}
</style></head><body>

    let rows='';
    for(const k of ['dragon','riftherald','baron','voidgrub']){
      const o=(sa.our||{})[k],r=(sa.rival||{})[k];
      if(o==null&&r==null)continue;
      const oc=(o!=null&&r!=null&&o<=r)?'g':'',rc=(o!=null&&r!=null&&r<o)?'g':'';
      rows+='<tr><td>'+(SL[k]||k)+'</td><td><span class="mono '+oc+'">'+(o!=null?fmtS(o):'—')+'</span></td><td><span class="mono '+rc+'">'+(r!=null?fmtS(r):'—')+'</span></td></tr>';
    }
    const d=document.createElement('div');
    d.innerHTML='<div class="sec-lbl" style="margin-top:4px">SETUP DE OBJETIVOS — media spawn → kill (verde = más rápido)</div><table class="gtable"><thead><tr><th>OBJETIVO</th><th>NOSOTROS</th><th>RIVAL</th></tr></thead><tbody>'+rows+'</tbody></table>';
    secS.appendChild(d);
  }
  (DATA.games||[]).forEach(function(g,gi){
    const s=document.getElementById('sec-g'+gi); if(!s)return;
    if(g.grid_firsts&&g.grid_firsts.length){
      const rows=g.grid_firsts.map(function(x){
        return '<tr><td>'+x.label+'</td><td><span class="mono '+(x.ours?'b':'r')+'">'+x.team+'</span>'+(x.check==='MISMATCH'?' <span class="mono r">✗ MISMATCH JSONL</span>':'')+'</td></tr>';}).join('');
      const d=document.createElement('div');
      d.innerHTML='<div class="sec-lbl" style="margin-top:4px">FIRSTS (GRID)</div><table class="gtable"><tbody>'+rows+'</tbody></table>';
      s.appendChild(d);
    }
    if(g.setup&&g.setup.length){
      const rows=g.setup.map(function(x){
        return '<tr><td>'+x.name+'</td><td><span class="mono '+(x.ours?'b':'r')+'">'+(x.ours?'NOSOTROS':'RIVAL')+'</span></td><td><span class="mono dim">'+x.spawn_str+'</span></td><td><span class="mono">'+x.kill_str+'</span></td><td><span class="mono '+(x.setup_s<=90?'g':'')+'">'+fmtS(x.setup_s)+'</span></td></tr>';}).join('');
      const d=document.createElement('div');
      d.innerHTML='<div class="sec-lbl" style="margin-top:4px">SETUP DE OBJETIVOS (spawn → kill)</div><table class="gtable"><thead><tr><th>OBJETIVO</th><th>EQUIPO</th><th>SPAWN</th><th>KILL</th><th>SETUP</th></tr></thead><tbody>'+rows+'</tbody></table>';
      s.appendChild(d);
    }
    const gt=g.grid_team;
    if(gt&&gt.our){
      function row(l,f){return '<tr><td>'+l+'</td><td><span class="mono">'+f(gt.our)+'</span></td><td><span class="mono">'+(gt.rival?f(gt.rival):'—')+'</span></td></tr>';}
      const d=document.createElement('div');
      d.innerHTML='<div class="sec-lbl" style="margin-top:4px">GRID — EQUIPO</div><table class="gtable"><thead><tr><th></th><th>NOSOTROS</th><th>RIVAL</th></tr></thead><tbody>'
        +row('Gold diff final',function(x){return (x.money_diff>0?'+':'')+x.money_diff.toLocaleString();})
        +row('Vision score',function(x){return x.vision_score+' ('+x.vs_per_min+'/min)';})
        +row('Wards matados',function(x){return x.wards_killed;})
        +row('Plates top/mid/bot',function(x){return x.plates_by_lane.top+'/'+x.plates_by_lane.mid+'/'+x.plates_by_lane.bot;})
        +row('FWD% medio equipo',function(x){return x.avg_fwd!=null?x.avg_fwd+'%':'—';})
        +'</tbody></table>';
      s.appendChild(d);
    }
  });
})();

</script></body></html>
